name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  rust:
    name: Rust workspace and guardrails
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Show toolchain
        run: rustc --version && cargo --version
      - name: Cargo metadata
        run: cargo metadata --format-version 1 --no-deps
      - name: Cargo test
        run: cargo test --workspace
      - name: No placeholder product code
        run: bash scripts/check_no_placeholders.sh
      - name: Enforce 600-line file ceiling
        run: python3 scripts/check_line_count.py

  nim-secret:
    name: NIM secret preflight
    runs-on: ubuntu-latest
    env:
      NIM_KEY: ${{ secrets.NIM_KEY }}
      NIM_BASE_URL: https://integrate.api.nvidia.com/v1
    steps:
      - name: Check NIM secret presence without printing it
        run: |
          if [ -z "${NIM_KEY:-}" ]; then
            echo "NIM_KEY GitHub secret is missing or unavailable in this event"
            exit 0
          fi
          echo "NIM_KEY is configured"
