name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      NIM_KEY: ${{ secrets.NIM_KEY }}
      NIM_BASE_URL: https://integrate.api.nvidia.com/v1
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Check NIM secret presence without printing it
        run: |
          if [ -z "${NIM_KEY:-}" ]; then
            echo "NIM_KEY GitHub secret is missing"
            exit 1
          fi
          echo "NIM_KEY is configured"
      - name: Cargo metadata
        run: cargo metadata --format-version 1 --no-deps
      - name: Cargo test
        run: cargo test --workspace
      - name: No placeholder product code
        run: bash scripts/check_no_placeholders.sh
      - name: Enforce 600-line file ceiling
        run: python3 scripts/check_line_count.py
